name: Android APK

on:
  push:
    branches: [main]
    paths-ignore:
      - "electron/**"
      - "server/**"
      - "*.md"
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Create keystore (release only)
        if: github.event.inputs.build_type == 'release'
        run: |
          keytool -genkey -v -keystore android/app/climaneer.keystore \
            -alias climaneer -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.ANDROID_KEY_PASSWORD }}" \
            -dname "CN=Climaneer, OU=Dev, O=Climaneer, L=City, S=State, C=US"

      - name: Build static export & sync Capacitor
        run: node scripts/mobile-build.mjs

      - name: Build APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || '' }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'climaneer' }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || '' }}
        run: |
          cd android
          chmod +x gradlew
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            ./gradlew assembleRelease --no-daemon
          else
            ./gradlew assembleDebug --no-daemon
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: climaneer-apk-${{ github.event.inputs.build_type || 'debug' }}
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk
