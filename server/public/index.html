<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CLIMANEER Realtime DB</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #e5e7eb;
      min-height: 100vh;
    }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px; background: #18181b; border-bottom: 1px solid #27272a;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand i { font-size: 22px; color: #10b981; }
    .brand h1 { font-size: 18px; font-weight: 700; }
    .brand span { font-size: 12px; color: #a1a1aa; }
    .status-bar { display: flex; align-items: center; gap: 16px; font-size: 13px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .dot.green { background: #10b981; }
    .dot.red { background: #ef4444; }
    .dot.yellow { background: #eab308; }
    .connected { color: #4ade80; }
    .disconnected { color: #f87171; }

    .main { display: flex; height: calc(100vh - 61px); }
    .tree { flex: 1; overflow-y: auto; padding: 16px 24px; }
    .sidebar {
      width: 320px; background: #18181b; border-left: 1px solid #27272a;
      padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
    }
    .sidebar h3 { font-size: 13px; font-weight: 600; color: #a1a1aa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .sidebar button {
      width: 100%; padding: 10px 16px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s;
      text-align: left; display: flex; align-items: center; gap: 8px;
    }
    .btn-pump-on { background: #052e16; color: #4ade80; }
    .btn-pump-on:hover { background: #0a3d1e; }
    .btn-pump-off { background: #3b0a0a; color: #f87171; }
    .btn-pump-off:hover { background: #4f0e0e; }
    .btn-mode { background: #1c1917; color: #e5e7eb; }
    .btn-mode:hover { background: #292524; }
    .btn-mode.active { background: #1c3d2e; color: #4ade80; border: 1px solid #10b981; }
    .log { flex: 1; background: #0f0f13; border-radius: 8px; padding: 12px; font-family: 'Courier New', monospace; font-size: 11px; color: #a1a1aa; overflow-y: auto; max-height: 200px; }
    .log div { padding: 2px 0; border-bottom: 1px solid #1a1a1f; }
    .log .in { color: #60a5fa; }
    .log .out { color: #f59e0b; }

    .node { margin-left: 0; }
    .node-row {
      display: flex; align-items: center; padding: 3px 0; cursor: pointer;
      border-radius: 4px; transition: background .1s;
      font-size: 13px; line-height: 1.6;
    }
    .node-row:hover { background: #1a1a1f; }
    .node-row .key { color: #93c5fd; margin-right: 8px; }
    .node-row .key.string { color: #93c5fd; }
    .node-row .sep { color: #52525b; margin-right: 8px; }
    .node-row .value { color: #e5e7eb; }
    .node-row .value.string { color: #a5d6a7; }
    .node-row .value.number { color: #f9a825; }
    .node-row .value.boolean { color: #ce93d8; }
    .node-row .value.null { color: #78909c; font-style: italic; }
    .node-row .toggle { color: #52525b; margin-right: 6px; width: 14px; display: inline-block; text-align: center; cursor: pointer; user-select: none; }
    .node-row .toggle:hover { color: #a1a1aa; }
    .node-children { margin-left: 20px; border-left: 1px solid #27272a; padding-left: 8px; }
    .node-children.hidden { display: none; }
    .input-edit {
      background: #1a1a2e; border: 1px solid #10b981; border-radius: 4px;
      color: #e5e7eb; font: inherit; font-size: 13px; padding: 1px 6px;
      outline: none; min-width: 60px; width: auto;
    }
    .input-edit:focus { border-color: #22d3ee; }
    .toast {
      position: fixed; bottom: 24px; right: 24px; padding: 10px 20px;
      border-radius: 8px; font-size: 13px; font-weight: 500; z-index: 100;
      animation: fadeIn .2s; transform-origin: bottom right;
    }
    .toast.success { background: #052e16; color: #4ade80; border: 1px solid #10b981; }
    .toast.error { background: #3b0a0a; color: #f87171; border: 1px solid #ef4444; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
  </style>
</head>
<body>
  <div class="header">
    <div class="brand">
      <i class="fas fa-seedling"></i>
      <div><h1>CLIMANEER Realtime DB</h1><span>Socket.IO • Live JSON Editor</span></div>
    </div>
    <div class="status-bar">
      <span id="device-badge" style="background:#1c1917;padding:4px 12px;border-radius:6px;font-size:12px">Not registered</span>
      <span id="status-text"><span class="dot yellow"></span>Connecting...</span>
    </div>
  </div>
  <div class="main">
    <div class="tree" id="tree"></div>
    <div class="sidebar">
      <h3>Quick Controls</h3>
      <button class="btn-pump-on" onclick="sendPump(true)"><i class="fas fa-play"></i> Start Pump</button>
      <button class="btn-pump-off" onclick="sendPump(false)"><i class="fas fa-stop"></i> Stop Pump</button>
      <button class="btn-mode" id="mode-auto" onclick="sendMode('AUTO')"><i class="fas fa-magic"></i> Auto Mode</button>
      <button class="btn-mode" id="mode-manual" onclick="sendMode('MANUAL')"><i class="fas fa-hand"></i> Manual Mode</button>

      <h3 style="margin-top:8px">Event Log</h3>
      <div class="log" id="log"></div>
    </div>
  </div>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script>
    const CONFIG = {
      device_name: "Farm-1",
      device_id: "ESP32_AQUACLIMA_001",
      firmware: "2.0.0",
      board: "ESP32"
    };

    let socket = null;
    let treeData = { ...getDefaultData() };
    let expanded = new Set();
    let pendingTimers = {};

    function getDefaultData() {
      return {
        device_name: CONFIG.device_name,
        device_id: CONFIG.device_id,
        timestamp: Date.now(),
        sensors: {
          soil_moisture: 0, ph: 0, air_humidity: 0, air_temp: 0,
          water_temp: 0, water_level: 0, air_quality: 0, flow: 0, battery: 90
        },
        controls: { manual_override: false, pump: false, mode: "AUTO" },
        ai: { recommendation: "Awaiting data..." },
        status: { wifi: false, socket: false, uptime: 0 }
      };
    }

    function toast(msg, type = "success") {
      const t = document.createElement("div");
      t.className = `toast ${type}`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }

    function log(msg, dir = "in") {
      const el = document.getElementById("log");
      const d = document.createElement("div");
      d.className = dir;
      d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      el.appendChild(d);
      el.scrollTop = el.scrollHeight;
    }

    function getType(v) {
      if (v === null || v === undefined) return "null";
      if (typeof v === "string") return "string";
      if (typeof v === "number") return "number";
      if (typeof v === "boolean") return "boolean";
      if (Array.isArray(v)) return "array";
      return "object";
    }

    function formatValue(v) {
      if (v === null || v === undefined) return "null";
      if (typeof v === "string") return `"${v}"`;
      if (typeof v === "number") return v.toString();
      if (typeof v === "boolean") return v.toString();
      return JSON.stringify(v);
    }

    function buildTree(obj, path = "", depth = 0) {
      if (typeof obj !== "object" || obj === null) {
        const type = getType(obj);
        return `<span class="value ${type}">${formatValue(obj)}</span>`;
      }

      const keys = Object.keys(obj);
      const isOpen = expanded.has(path) || depth < 2;
      const toggle = keys.length > 0 ? (isOpen ? "▾" : "▸") : "";
      const count = `${keys.length} ${keys.length === 1 ? "key" : "keys"}`;
      const brace = Array.isArray(obj) ? "[]" : "{}";

      let html = `<div class="node" data-path="${path}">`;
      html += `<div class="node-row" onclick="toggleNode('${path}')">`;
      html += `<span class="toggle">${toggle}</span>`;
      if (path) html += `<span class="key">${path.split(".").pop()}</span><span class="sep">:</span>`;
      html += `<span style="color:#52525b">${brace[0]} </span>`;
      html += `<span style="color:#71717a;font-size:12px">${count}</span>`;
      html += `<span style="color:#52525b"> ${brace[1]}</span>`;
      html += `</div>`;
      html += `<div class="node-children ${isOpen ? "" : "hidden"}">`;

      for (const key of keys) {
        const childPath = path ? `${path}.${key}` : key;
        const val = obj[key];
        if (typeof val === "object" && val !== null) {
          html += buildTree(val, childPath, depth + 1);
        } else {
          const type = getType(val);
          html += `<div class="node" data-path="${childPath}">`;
          html += `<div class="node-row" style="padding-left:24px">`;
          html += `<span class="key ${type}">${key}</span><span class="sep">:</span>`;
          html += `<span class="value ${type}" onclick="editValue('${childPath}', event)">${formatValue(val)}</span>`;
          html += `</div></div>`;
        }
      }

      html += `</div></div>`;
      return html;
    }

    function render() {
      document.getElementById("tree").innerHTML = buildTree(treeData, "", 0);
    }

    function toggleNode(path) {
      const el = document.querySelector(`.node[data-path="${path}"] .node-children`);
      if (!el) return;
      const isHidden = el.classList.contains("hidden");
      el.classList.toggle("hidden");
      const toggle = document.querySelector(`.node[data-path="${path}"] .toggle`);
      if (toggle) toggle.textContent = isHidden ? "▾" : "▸";
      if (isHidden) expanded.add(path);
      else expanded.delete(path);
    }

    function setNestedValue(obj, path, value) {
      const keys = path.split(".");
      let current = obj;
      for (let i = 0; i < keys.length - 1; i++) {
        if (current[keys[i]] === undefined) current[keys[i]] = {};
        current = current[keys[i]];
      }
      current[keys[keys.length - 1]] = value;
    }

    function getNestedValue(obj, path) {
      const keys = path.split(".");
      let current = obj;
      for (const key of keys) {
        if (current === undefined || current === null) return undefined;
        current = current[key];
      }
      return current;
    }

    function getParentPath(path) {
      const parts = path.split(".");
      parts.pop();
      return parts.join(".");
    }

    function editValue(path, event) {
      event.stopPropagation();
      const row = event.target.closest(".node-row");
      if (!row) return;
      const currentVal = getNestedValue(treeData, path);

      const span = event.target;
      const isStr = typeof currentVal === "string";
      const display = isStr ? currentVal : formatValue(currentVal);

      const input = document.createElement("input");
      input.className = "input-edit";
      input.value = isStr ? currentVal : display;
      input.dataset.original = display;
      input.dataset.path = path;
      input.dataset.type = typeof currentVal;

      span.replaceWith(input);
      input.focus();
      input.select();

      const finish = () => {
        const raw = input.value;
        let newVal;
        const origType = input.dataset.type;
        if (origType === "number") newVal = raw === "" ? 0 : Number(raw);
        else if (origType === "boolean") newVal = raw === "true" || raw === "1";
        else if (origType === "null") newVal = null;
        else newVal = raw;

        if (Number.isNaN(newVal)) newVal = 0;

        setNestedValue(treeData, path, newVal);
        emitChange(path, newVal);
        render();
      };

      input.addEventListener("blur", finish);
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") { input.blur(); }
        if (e.key === "Escape") {
          setNestedValue(treeData, path, currentVal);
          render();
        }
      });
    }

    function emitChange(path, value) {
      if (!socket || !socket.connected) { toast("Socket not connected", "error"); return; }

      const parts = path.split(".");
      const top = parts[0];

      if (top === "sensors") {
        const sensors = treeData.sensors;
        const payload = { ...sensors };
        for (const k of Object.keys(payload)) {
          if (typeof payload[k] === "number" && Number.isNaN(payload[k])) payload[k] = 0;
        }
        socket.emit("sensor_update", { sensors: payload });
        log(`sensor_update sent`, "out");
        toast("Sensors updated");
      } else if (top === "controls") {
        if (parts[1] === "pump") {
          socket.emit("command", { device_id: CONFIG.device_id, command: "pump", params: { state: !!value } });
          log(`command: pump=${!!value}`, "out");
          toast(`Pump ${value ? "ON" : "OFF"}`);
        } else if (parts[1] === "mode") {
          socket.emit("command", { device_id: CONFIG.device_id, command: "mode", params: { mode: value } });
          log(`command: mode=${value}`, "out");
          toast(`Mode: ${value}`);
        } else if (parts[1] === "manual_override") {
          const mode = value ? "MANUAL" : "AUTO";
          socket.emit("command", { device_id: CONFIG.device_id, command: "mode", params: { mode } });
          treeData.controls.mode = mode;
          log(`command: manual_override=${value} (mode=${mode})`, "out");
          toast(`Manual override ${value ? "ON" : "OFF"}`);
        }
      } else if (top === "ai") {
        socket.emit("override_ai", { device_id: CONFIG.device_id, recommendation: value });
        log(`override_ai sent`, "out");
        toast("AI recommendation updated");
      } else if (top === "device_name" || top === "device_id") {
        toast("Device identity cannot be changed via realtime", "error");
      }
    }

    function sendPump(state) {
      if (!socket || !socket.connected) { toast("Not connected", "error"); return; }
      treeData.controls.pump = state;
      if (state) treeData.controls.manual_override = true;
      socket.emit("command", { device_id: CONFIG.device_id, command: "pump", params: { state } });
      log(`command: pump=${state}`, "out");
      render();
      toast(state ? "Pump started" : "Pump stopped");
    }

    function sendMode(mode) {
      if (!socket || !socket.connected) { toast("Not connected", "error"); return; }
      treeData.controls.mode = mode;
      treeData.controls.manual_override = mode === "MANUAL";
      socket.emit("command", { device_id: CONFIG.device_id, command: "mode", params: { mode } });
      log(`command: mode=${mode}`, "out");
      render();
      toast(`Mode: ${mode}`);
    }

    function updateStatus(connected) {
      const dot = document.querySelector("#status-text .dot");
      const text = document.getElementById("status-text");
      if (connected) {
        text.innerHTML = `<span class="dot green"></span> <span class="connected">Connected</span>`;
        document.getElementById("device-badge").textContent = CONFIG.device_id;
      } else {
        text.innerHTML = `<span class="dot red"></span> <span class="disconnected">Disconnected</span>`;
      }
    }

    function connect() {
      const url = window.location.origin;
      socket = io(url, {
        transports: ["websocket", "polling"],
        reconnection: true,
        reconnectionDelay: 2000,
      });

      socket.on("connect", () => {
        updateStatus(true);
        log(`Connected (${socket.id})`, "in");
        socket.emit("register", {
          device_name: CONFIG.device_name,
          device_id: CONFIG.device_id,
          firmware_version: CONFIG.firmware,
          board_type: CONFIG.board
        });
        log("register sent", "out");
        treeData.status.socket = true;
        render();
      });

      socket.on("device_registered", (data) => {
        log(`Registered: ${data.device_id}`, "in");
        toast("Device registered on server");
        treeData.status.socket = true;
        render();
      });

      socket.on("sensor_update", (data) => {
        log(`sensor_update received`, "in");
        if (data.sensors) {
          Object.assign(treeData.sensors, data.sensors);
        }
        treeData.timestamp = Date.now();
        if (data.pump !== undefined) treeData.controls.pump = data.pump;
        if (data.mode) treeData.controls.mode = data.mode;
        if (data.manual_override !== undefined) treeData.controls.manual_override = data.manual_override;
        if (data.device_name) treeData.device_name = data.device_name;
        render();
      });

      socket.on("controls_update", (data) => {
        log(`controls_update received`, "in");
        if (data.pump !== undefined) treeData.controls.pump = data.pump;
        if (data.mode) treeData.controls.mode = data.mode;
        if (data.manual_override !== undefined) treeData.controls.manual_override = data.manual_override;
        render();
      });

      socket.on("command", (data) => {
        log(`command: ${data.command} ${JSON.stringify(data.params)}`, "in");
      });

      socket.on("device_status", (data) => {
        treeData.status.wifi = data.online;
        if (data.last_seen) treeData.timestamp = new Date(data.last_seen).getTime();
        render();
      });

      socket.on("heartbeat_ack", (data) => {
        treeData.status.uptime = 0;
        render();
      });

      socket.on("ai_recommendation", (data) => {
        if (data.recommendation) treeData.ai.recommendation = data.recommendation;
        render();
      });

      socket.on("connect_error", (err) => {
        log(`Error: ${err.message}`, "in");
        updateStatus(false);
      });

      socket.on("disconnect", () => {
        updateStatus(false);
        treeData.status.socket = false;
        log("Disconnected", "in");
        render();
      });
    }

    document.addEventListener("DOMContentLoaded", () => {
      render();
      connect();

      // Heartbeat to update timestamp
      setInterval(() => {
        if (socket && socket.connected) {
          treeData.timestamp = Date.now();
          render();
        }
      }, 5000);
    });
  </script>
</body>
</html>
