<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CLIMANEER Realtime DB</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <link rel="icon" href="/favicon.png" type="image/png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #e5e7eb;
      min-height: 100vh;
    }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px; background: #18181b; border-bottom: 1px solid #27272a;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand i { font-size: 22px; color: #10b981; }
    .brand h1 { font-size: 18px; font-weight: 700; }
    .brand span { font-size: 12px; color: #a1a1aa; }
    .status-bar { display: flex; align-items: center; gap: 16px; font-size: 13px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .dot.green { background: #10b981; }
    .dot.red { background: #ef4444; }
    .dot.yellow { background: #eab308; }
    .connected { color: #4ade80; }
    .disconnected { color: #f87171; }

    .main { display: flex; height: calc(100vh - 61px); }
    .tree { flex: 1; overflow-y: auto; padding: 16px 24px; }
    .sidebar {
      width: 320px; background: #18181b; border-left: 1px solid #27272a;
      padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
    }
    .sidebar h3 { font-size: 13px; font-weight: 600; color: #a1a1aa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .sidebar button {
      width: 100%; padding: 10px 16px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s;
      text-align: left; display: flex; align-items: center; gap: 8px;
    }
    .btn-pump-on { background: #052e16; color: #4ade80; }
    .btn-pump-on:hover { background: #0a3d1e; }
    .btn-pump-off { background: #3b0a0a; color: #f87171; }
    .btn-pump-off:hover { background: #4f0e0e; }
    .btn-mode { background: #1c1917; color: #e5e7eb; }
    .btn-mode:hover { background: #292524; }
    .btn-mode.active { background: #1c3d2e; color: #4ade80; border: 1px solid #10b981; }
    .log { flex: 1; background: #0f0f13; border-radius: 8px; padding: 12px; font-family: 'Courier New', monospace; font-size: 11px; color: #a1a1aa; overflow-y: auto; max-height: 200px; }
    .log div { padding: 2px 0; border-bottom: 1px solid #1a1a1f; }
    .log .in { color: #60a5fa; }
    .log .out { color: #f59e0b; }

    .node { margin-left: 0; }
    .node-row {
      display: flex; align-items: center; padding: 3px 0; cursor: pointer;
      border-radius: 4px; transition: background .1s;
      font-size: 13px; line-height: 1.6;
    }
    .node-row:hover { background: #1a1a1f; }
    .node-row .key { color: #93c5fd; margin-right: 8px; }
    .node-row .key.string { color: #93c5fd; }
    .node-row .sep { color: #52525b; margin-right: 8px; }
    .node-row .value { color: #e5e7eb; }
    .node-row .value.string { color: #a5d6a7; }
    .node-row .value.number { color: #f9a825; }
    .node-row .value.boolean { color: #ce93d8; }
    .node-row .value.null { color: #78909c; font-style: italic; }
    .node-row .toggle { color: #52525b; margin-right: 6px; width: 14px; display: inline-block; text-align: center; cursor: pointer; user-select: none; }
    .node-row .toggle:hover { color: #a1a1aa; }
    .node-children { margin-left: 20px; border-left: 1px solid #27272a; padding-left: 8px; }
    .node-children.hidden { display: none; }
    .input-edit {
      background: #1a1a2e; border: 1px solid #10b981; border-radius: 4px;
      color: #e5e7eb; font: inherit; font-size: 13px; padding: 1px 6px;
      outline: none; min-width: 60px; width: auto;
    }
    .input-edit:focus { border-color: #22d3ee; }
    .toast {
      position: fixed; bottom: 24px; right: 24px; padding: 10px 20px;
      border-radius: 8px; font-size: 13px; font-weight: 500; z-index: 100;
      animation: fadeIn .2s; transform-origin: bottom right;
    }
    .toast.success { background: #052e16; color: #4ade80; border: 1px solid #10b981; }
    .toast.error { background: #3b0a0a; color: #f87171; border: 1px solid #ef4444; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
    .device-bar {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .device-btn {
      background: #1c1917; color: #a1a1aa; border: 1px solid #27272a;
      padding: 4px 12px; border-radius: 6px; font-size: 12px;
      cursor: pointer; transition: all .15s; font-family: inherit; white-space: nowrap;
    }
    .device-btn:hover { background: #292524; color: #e5e7eb; }
    .device-btn.active { background: #1c3d2e; border-color: #10b981; color: #4ade80; }
    .device-btn .online-dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 5px;
    }
    .device-btn .online-dot.on { background: #4ade80; }
    .device-btn .online-dot.off { background: #f87171; }
  </style>
</head>
<body>
  <div class="header">
    <div class="brand">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:12px;background:linear-gradient(135deg,#10b981,#047857);box-shadow:0 4px 12px rgba(16,185,129,0.25)">
          <i class="fas fa-leaf" style="color:white;font-size:18px"></i>
        </div>
        <div>
          <div style="display:flex;align-items:baseline;gap:6px">
            <span style="font-size:18px;font-weight:700;background:linear-gradient(135deg,#10b981,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">climaneer</span>
            <span style="font-size:10px;font-weight:600;color:#10b981;background:rgba(16,185,129,0.1);padding:1px 6px;border-radius:4px">v2</span>
          </div>
          <div style="font-size:11px;color:#a1a1aa;letter-spacing:0.5px">future of farming</div>
        </div>
      </div>
    </div>
    <div class="status-bar">
      <div class="device-bar" id="device-selector"></div>
      <span id="status-text"><span class="dot yellow"></span>Connecting...</span>
    </div>
  </div>
  <div class="main">
    <div class="tree" id="tree"></div>
    <div class="sidebar">
      <h3>Quick Controls</h3>
      <button class="btn-pump-on" onclick="sendPump(true)"><i class="fas fa-play"></i> Start Pump</button>
      <button class="btn-pump-off" onclick="sendPump(false)"><i class="fas fa-stop"></i> Stop Pump</button>
      <button class="btn-mode" id="mode-auto" onclick="sendMode('AUTO')"><i class="fas fa-magic"></i> Auto Mode</button>
      <button class="btn-mode" id="mode-manual" onclick="sendMode('MANUAL')"><i class="fas fa-hand"></i> Manual Mode</button>

      <h3 style="margin-top:8px">Event Log</h3>
      <div class="log" id="log"></div>
    </div>
  </div>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script>
    let socket = null;
    let devicesData = {};
    let currentDeviceId = null;
    let expanded = new Set();
    let pendingTimers = {};

    function getDefaultDeviceData() {
      return {
        device_id: "",
        device_name: "",
        timestamp: Date.now(),
        sensors: {
          soil_moisture: 0, ph: 0, air_humidity: 0, air_temp: 0,
          water_temp: 0, water_level: 0, air_quality: 0, flow: 0, battery: 90
        },
        controls: { manual_override: false, pump: false, mode: "AUTO" },
        ai: { recommendation: "Awaiting data..." },
        status: { online: false, last_seen: null }
      };
    }

    function ensureDeviceData(device_id, device_name) {
      if (!devicesData[device_id]) {
        devicesData[device_id] = getDefaultDeviceData();
        devicesData[device_id].device_id = device_id;
      }
      if (device_name) devicesData[device_id].device_name = device_name;
      if (!currentDeviceId) currentDeviceId = device_id;
    }

    function selectDevice(device_id) {
      currentDeviceId = device_id;
      updateDeviceSelector();
      render();
    }

    function updateDeviceSelector() {
      const container = document.getElementById("device-selector");
      if (!container) return;
      const ids = Object.keys(devicesData);
      if (ids.length === 0) {
        container.innerHTML = '<span style="color:#52525b;font-size:12px">No devices</span>';
        return;
      }
      container.innerHTML = ids.map(id => {
        const dev = devicesData[id];
        const active = id === currentDeviceId ? "active" : "";
        const online = dev.status.online ? "on" : "off";
        const label = dev.device_name || id;
        return '<button class="device-btn ' + active + '" onclick="selectDevice(\'' + id + '\')">' +
          '<span class="online-dot ' + online + '"></span>' + label +
        '</button>';
      }).join("");
    }

    function toast(msg, type = "success") {
      const t = document.createElement("div");
      t.className = `toast ${type}`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }

    function log(msg, dir = "in") {
      const el = document.getElementById("log");
      const d = document.createElement("div");
      d.className = dir;
      d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      el.appendChild(d);
      el.scrollTop = el.scrollHeight;
    }

    function getType(v) {
      if (v === null || v === undefined) return "null";
      if (typeof v === "string") return "string";
      if (typeof v === "number") return "number";
      if (typeof v === "boolean") return "boolean";
      if (Array.isArray(v)) return "array";
      return "object";
    }

    function formatValue(v) {
      if (v === null || v === undefined) return "null";
      if (typeof v === "string") return `"${v}"`;
      if (typeof v === "number") return v.toString();
      if (typeof v === "boolean") return v.toString();
      return JSON.stringify(v);
    }

    function buildTree(obj, path = "", depth = 0) {
      if (typeof obj !== "object" || obj === null) {
        const type = getType(obj);
        return `<span class="value ${type}">${formatValue(obj)}</span>`;
      }

      const keys = Object.keys(obj);
      const isOpen = expanded.has(path) || depth < 2;
      const toggle = keys.length > 0 ? (isOpen ? "▾" : "▸") : "";
      const count = `${keys.length} ${keys.length === 1 ? "key" : "keys"}`;
      const brace = Array.isArray(obj) ? "[]" : "{}";

      let html = `<div class="node" data-path="${path}">`;
      html += `<div class="node-row" onclick="toggleNode('${path}')">`;
      html += `<span class="toggle">${toggle}</span>`;
      if (path) html += `<span class="key">${path.split(".").pop()}</span><span class="sep">:</span>`;
      html += `<span style="color:#52525b">${brace[0]} </span>`;
      html += `<span style="color:#71717a;font-size:12px">${count}</span>`;
      html += `<span style="color:#52525b"> ${brace[1]}</span>`;
      html += `</div>`;
      html += `<div class="node-children ${isOpen ? "" : "hidden"}">`;

      for (const key of keys) {
        const childPath = path ? `${path}.${key}` : key;
        const val = obj[key];
        if (typeof val === "object" && val !== null) {
          html += buildTree(val, childPath, depth + 1);
        } else {
          const type = getType(val);
          html += `<div class="node" data-path="${childPath}">`;
          html += `<div class="node-row" style="padding-left:24px">`;
          html += `<span class="key ${type}">${key}</span><span class="sep">:</span>`;
          html += `<span class="value ${type}" onclick="editValue('${childPath}', event)">${formatValue(val)}</span>`;
          html += `</div></div>`;
        }
      }

      html += `</div></div>`;
      return html;
    }

    function render() {
      const dev = currentDeviceId ? devicesData[currentDeviceId] : null;
      document.getElementById("tree").innerHTML = dev
        ? buildTree(dev, "", 0)
        : '<div style="padding:24px;color:#71717a">No device selected. Waiting for data...</div>';
    }

    function toggleNode(path) {
      const el = document.querySelector(`.node[data-path="${path}"] .node-children`);
      if (!el) return;
      const isHidden = el.classList.contains("hidden");
      el.classList.toggle("hidden");
      const toggle = document.querySelector(`.node[data-path="${path}"] .toggle`);
      if (toggle) toggle.textContent = isHidden ? "▾" : "▸";
      if (isHidden) expanded.add(path);
      else expanded.delete(path);
    }

    function setNestedValue(obj, path, value) {
      const keys = path.split(".");
      let current = obj;
      for (let i = 0; i < keys.length - 1; i++) {
        if (current[keys[i]] === undefined) current[keys[i]] = {};
        current = current[keys[i]];
      }
      current[keys[keys.length - 1]] = value;
    }

    function getNestedValue(obj, path) {
      const keys = path.split(".");
      let current = obj;
      for (const key of keys) {
        if (current === undefined || current === null) return undefined;
        current = current[key];
      }
      return current;
    }

    function getParentPath(path) {
      const parts = path.split(".");
      parts.pop();
      return parts.join(".");
    }

    function editValue(path, event) {
      event.stopPropagation();
      const dev = currentDeviceId ? devicesData[currentDeviceId] : null;
      if (!dev) return;
      const row = event.target.closest(".node-row");
      if (!row) return;
      const currentVal = getNestedValue(dev, path);

      const span = event.target;
      const isStr = typeof currentVal === "string";
      const display = isStr ? currentVal : formatValue(currentVal);

      const input = document.createElement("input");
      input.className = "input-edit";
      input.value = isStr ? currentVal : display;
      input.dataset.original = display;
      input.dataset.path = path;
      input.dataset.type = typeof currentVal;

      span.replaceWith(input);
      input.focus();
      input.select();

      const finish = () => {
        const raw = input.value;
        let newVal;
        const origType = input.dataset.type;
        if (origType === "number") newVal = raw === "" ? 0 : Number(raw);
        else if (origType === "boolean") newVal = raw === "true" || raw === "1";
        else if (origType === "null") newVal = null;
        else newVal = raw;

        if (Number.isNaN(newVal)) newVal = 0;

        setNestedValue(dev, path, newVal);
        emitChange(path, newVal);
        render();
      };

      input.addEventListener("blur", finish);
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") { input.blur(); }
        if (e.key === "Escape") {
          setNestedValue(dev, path, currentVal);
          render();
        }
      });
    }

    function emitChange(path, value) {
      if (!socket || !socket.connected) { toast("Socket not connected", "error"); return; }
      if (!currentDeviceId) { toast("No device selected", "error"); return; }

      const parts = path.split(".");
      const top = parts[0];
      const did = currentDeviceId;

      if (top === "sensors") {
        const sensor_key = parts[1];
        socket.emit("override_sensor", {
          device_id: did,
          sensor_key: sensor_key,
          value: value,
          enabled: true
        });
        log(`override_sensor: ${did} ${sensor_key}=${value}`, "out");
        toast(`Override ${sensor_key} = ${value}`);
      } else if (top === "controls") {
        if (parts[1] === "pump") {
          socket.emit("command", { device_id: did, command: "pump", params: { state: !!value } });
          log(`command: pump=${!!value} for ${did}`, "out");
          toast(`Pump ${value ? "ON" : "OFF"}`);
        } else if (parts[1] === "mode") {
          socket.emit("command", { device_id: did, command: "mode", params: { mode: value } });
          log(`command: mode=${value} for ${did}`, "out");
          toast(`Mode: ${value}`);
        }
      } else if (top === "ai") {
        socket.emit("override_ai", { device_id: did, recommendation: value });
        log(`override_ai sent for ${did}`, "out");
        toast("AI recommendation updated");
      } else if (top === "device_name") {
        socket.emit("rename_device", { device_id: did, device_name: value });
        log(`rename_device: ${did} -> ${value}`, "out");
        toast(`Device renamed to ${value}`);
      }
    }

    function sendPump(state) {
      if (!socket || !socket.connected || !currentDeviceId) { toast("Not connected", "error"); return; }
      socket.emit("command", { device_id: currentDeviceId, command: "pump", params: { state } });
      log(`command: pump=${state} for ${currentDeviceId}`, "out");
      toast(state ? "Pump started" : "Pump stopped");
    }

    function sendMode(mode) {
      if (!socket || !socket.connected || !currentDeviceId) { toast("Not connected", "error"); return; }
      socket.emit("command", { device_id: currentDeviceId, command: "mode", params: { mode } });
      log(`command: mode=${mode} for ${currentDeviceId}`, "out");
      toast(`Mode: ${mode}`);
    }

    function updateStatus(connected) {
      const text = document.getElementById("status-text");
      if (connected) {
        text.innerHTML = '<span class="dot green"></span> <span class="connected">Connected</span>';
      } else {
        text.innerHTML = '<span class="dot red"></span> <span class="disconnected">Disconnected</span>';
      }
    }

    function connect() {
      const url = window.location.origin;
      socket = io(url, {
        transports: ["websocket", "polling"],
        reconnection: true,
        reconnectionDelay: 2000,
      });

      socket.on("connect", () => {
        updateStatus(true);
        log(`Connected (${socket.id})`, "in");
        socket.emit("dashboard_join");
        log("dashboard_join sent", "out");
      });

      socket.on("device_list", (devices) => {
        log(`device_list received: ${devices.length} devices`, "in");
        for (const device of devices) {
          ensureDeviceData(device.device_id, device.device_name);
        }
        updateDeviceSelector();
        render();
      });

      socket.on("sensor_update", (data) => {
        log(`sensor_update received for ${data.device_id}`, "in");
        ensureDeviceData(data.device_id, data.device_name);
        const dev = devicesData[data.device_id];
        if (data.sensors) {
          Object.assign(dev.sensors, data.sensors);
        }
        dev.timestamp = Date.now();
        if (data.pump !== undefined) dev.controls.pump = data.pump;
        if (data.mode) dev.controls.mode = data.mode;
        if (data.manual_override !== undefined) dev.controls.manual_override = data.manual_override;
        updateDeviceSelector();
        render();
      });

      socket.on("controls_update", (data) => {
        log(`controls_update received for ${data.device_id}`, "in");
        ensureDeviceData(data.device_id);
        const dev = devicesData[data.device_id];
        if (data.pump !== undefined) dev.controls.pump = data.pump;
        if (data.mode) dev.controls.mode = data.mode;
        if (data.manual_override !== undefined) dev.controls.manual_override = data.manual_override;
        render();
      });

      socket.on("command", (data) => {
        log(`command: ${data.command} ${JSON.stringify(data.params)}`, "in");
      });

      socket.on("device_status", (data) => {
        ensureDeviceData(data.device_id, data.device_name);
        const dev = devicesData[data.device_id];
        dev.status.online = data.online;
        if (data.last_seen) dev.timestamp = new Date(data.last_seen).getTime();
        updateDeviceSelector();
        render();
      });

      socket.on("ai_recommendation", (data) => {
        if (data.device_id && data.recommendation) {
          ensureDeviceData(data.device_id, data.device_name);
          devicesData[data.device_id].ai.recommendation = data.recommendation;
          render();
        }
      });

      socket.on("overrides_update", (data) => {
        log(`overrides_update for ${data.device_id}: active=${data.override_active}`, "in");
      });

      socket.on("device_disconnected", (data) => {
        log(`device_disconnected: ${data.device_id}`, "in");
        if (data.device_id && devicesData[data.device_id]) {
          devicesData[data.device_id].status.online = false;
          updateDeviceSelector();
          render();
        }
      });

      socket.on("connect_error", (err) => {
        log(`Error: ${err.message}`, "in");
        updateStatus(false);
      });

      socket.on("disconnect", () => {
        updateStatus(false);
        log("Disconnected", "in");
        render();
      });
    }

    document.addEventListener("DOMContentLoaded", () => {
      render();
      connect();

      setInterval(() => {
        if (socket && socket.connected) {
          const dev = currentDeviceId ? devicesData[currentDeviceId] : null;
          if (dev) {
            dev.timestamp = Date.now();
            render();
          }
        }
      }, 5000);
    });
  </script>
</body>
</html>
