name: Windows Electron

on:
  push:
    branches: [main]
    paths-ignore:
      - "android/**"
      - "server/**"
      - "*.md"
  workflow_dispatch:
    inputs:
      sign:
        description: "Code sign the installer"
        required: true
        default: false
        type: boolean

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install main dependencies
        run: npm ci

      - name: Build Next.js static export
        run: node scripts/static-export.mjs
        shell: pwsh

      - name: Install Electron dependencies
        working-directory: electron
        run: npm ci

      - name: Verify static export exists
        run: |
          if (-not (Test-Path "out/index.html")) {
            Write-Error "out/index.html not found — build failed"
            exit 1
          }
        shell: pwsh

      - name: Build Windows installer
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE_PATH || '' }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD || '' }}
        run: |
          if ("${{ github.event.inputs.sign }}" -eq "true") {
            npx electron-builder --win --publish never
          } else {
            npx electron-builder --win --publish never --config.win.certificateFile=""
          }

      - name: List build output
        run: Get-ChildItem -Path release -Recurse -ErrorAction SilentlyContinue | Select-Object Name, Length
        shell: pwsh

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: climaneer-windows
          path: release/*.exe
