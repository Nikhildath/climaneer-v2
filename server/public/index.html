<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CLIMANEER Realtime DB</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.png" type="image/png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#e5e7eb;height:100vh;display:flex;flex-direction:column;overflow:hidden}

    .topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:#111113;border-bottom:1px solid #27272a;min-height:48px}
    .topbar .left{display:flex;align-items:center;gap:14px}
    .topbar .logo{display:flex;align-items:center;gap:8px}
    .topbar .logo .icon{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#10b981,#047857);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px}
    .topbar .logo .text{font-size:14px;font-weight:700}
    .topbar .logo .text span{color:#10b981}
    .topbar .sep{color:#27272a;font-size:18px}
    .topbar .db-path{font-family:'JetBrains Mono',monospace;font-size:12px;color:#71717a}
    .topbar .right{display:flex;align-items:center;gap:12px}
    .conn-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
    .conn-dot.on{background:#10b981;box-shadow:0 0 6px #10b981}
    .conn-dot.off{background:#ef4444}
    .conn-label{font-size:11px;color:#a1a1aa}

    .layout{display:flex;flex:1;overflow:hidden}

    .sidebar{width:260px;background:#111113;border-right:1px solid #27272a;display:flex;flex-direction:column;overflow:hidden}
    .sidebar-header{padding:12px 14px;border-bottom:1px solid #1a1a1f;display:flex;align-items:center;justify-content:space-between}
    .sidebar-header h3{font-size:11px;font-weight:600;color:#71717a;text-transform:uppercase;letter-spacing:1px}
    .sidebar-actions{display:flex;gap:4px}
    .sidebar-actions button{width:26px;height:26px;border:1px solid #27272a;border-radius:6px;background:transparent;color:#a1a1aa;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s}
    .sidebar-actions button:hover{background:#1c1917;color:#e5e7eb;border-color:#3f3f46}
    .device-list{flex:1;overflow-y:auto;padding:6px}
    .device-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:all .1s;margin-bottom:2px}
    .device-item:hover{background:#1a1a1f}
    .device-item.active{background:#0f2318;border:1px solid #10b981}
    .device-item .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
    .device-item .dot.on{background:#10b981}
    .device-item .dot.off{background:#ef4444}
    .device-item .info{flex:1;min-width:0}
    .device-item .name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .device-item .meta{font-size:10px;color:#52525b;font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .device-item .actions{display:flex;gap:2px;opacity:0;transition:opacity .15s}
    .device-item:hover .actions{opacity:1}
    .device-item .actions button{width:22px;height:22px;border:none;border-radius:4px;background:transparent;color:#71717a;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px}
    .device-item .actions button:hover{background:#27272a;color:#e5e7eb}
    .device-item .actions button.del:hover{background:#3b0a0a;color:#f87171}

    .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .main-header{padding:10px 20px;border-bottom:1px solid #1a1a1f;display:flex;align-items:center;justify-content:space-between;min-height:42px}
    .main-header h2{font-size:13px;font-weight:600}
    .main-header .controls{display:flex;gap:6px}
    .main-header .controls button{padding:5px 12px;border:1px solid #27272a;border-radius:6px;background:transparent;color:#a1a1aa;font-size:11px;cursor:pointer;transition:all .15s;font-family:inherit;display:flex;align-items:center;gap:5px}
    .main-header .controls button:hover{background:#1c1917;color:#e5e7eb;border-color:#3f3f46}
    .main-header .controls button.active{background:#0f2318;color:#4ade80;border-color:#10b981}

    .tree-container{flex:1;overflow:auto;padding:16px 20px}
    .node{margin-left:0}
    .node-row{display:flex;align-items:center;padding:2px 0;cursor:pointer;border-radius:3px;transition:background .08s;font-size:13px;line-height:1.7;font-family:'JetBrains Mono',monospace}
    .node-row:hover{background:#1a1a1f}
    .node-row .toggle{color:#52525b;margin-right:4px;width:14px;text-align:center;cursor:pointer;user-select:none;flex-shrink:0}
    .node-row .toggle:hover{color:#a1a1aa}
    .node-row .key{color:#93c5fd;margin-right:6px;flex-shrink:0}
    .node-row .colon{color:#3f3f46;margin-right:6px}
    .node-row .value{color:#e5e7eb}
    .node-row .value.str{color:#a5d6a7}
    .node-row .value.num{color:#f9a825}
    .node-row .value.bool{color:#ce93d8}
    .node-row .value.null{color:#546e7a;font-style:italic}
    .node-row .bracket{color:#52525b}
    .node-row .count{color:#3f3f46;font-size:11px;margin-left:4px}
    .node-children{margin-left:18px;border-left:1px solid #1a1a1f;padding-left:10px}
    .node-children.hidden{display:none}
    .node-row .edit-val{cursor:pointer;padding:0 3px;border-radius:3px}
    .node-row .edit-val:hover{background:#1a1a2e;text-decoration:underline}
    .input-inline{background:#0a0a1a;border:1px solid #10b981;border-radius:4px;color:#e5e7eb;font:inherit;font-size:13px;padding:1px 6px;outline:none;min-width:50px;font-family:'JetBrains Mono',monospace}
    .input-inline:focus{border-color:#22d3ee}

    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;justify-content:center;align-items:center}
    .modal-bg.open{display:flex}
    .modal{background:#111113;border:1px solid #27272a;border-radius:14px;padding:24px;width:420px;max-width:92vw}
    .modal h3{font-size:15px;font-weight:600;margin-bottom:16px}
    .modal label{display:block;font-size:11px;color:#71717a;margin-bottom:3px;margin-top:14px;text-transform:uppercase;letter-spacing:.5px}
    .modal label:first-of-type{margin-top:0}
    .modal input{width:100%;padding:8px 12px;border:1px solid #27272a;border-radius:8px;background:#0a0a0f;color:#e5e7eb;font-size:13px;outline:none;font-family:'JetBrains Mono',monospace}
    .modal input:focus{border-color:#10b981}
    .modal-btns{display:flex;gap:8px;margin-top:22px;justify-content:flex-end}
    .modal-btns button{padding:8px 18px;border:none;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
    .btn-cancel{background:#27272a;color:#a1a1aa}.btn-cancel:hover{background:#3f3f46}
    .btn-primary{background:#052e16;color:#4ade80}.btn-primary:hover{background:#0a3d1e}
    .btn-warn{background:#3b0a0a;color:#f87171}.btn-warn:hover{background:#4f0e0e}

    .statusbar{padding:6px 20px;border-top:1px solid #1a1a1f;font-size:10px;color:#3f3f46;display:flex;justify-content:space-between;background:#0d0d10}

    .toast{position:fixed;bottom:20px;right:20px;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:500;z-index:400;animation:slideIn .2s}
    .toast.ok{background:#052e16;color:#4ade80;border:1px solid #10b981}
    .toast.err{background:#3b0a0a;color:#f87171;border:1px solid #ef4444}
    @keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#27272a;border-radius:3px}
    ::-webkit-scrollbar-thumb:hover{background:#3f3f46}
  </style>
</head>
<body>

  <!-- Top Bar -->
  <div class="topbar">
    <div class="left">
      <div class="logo">
        <div class="icon"><i class="fas fa-database"></i></div>
        <div class="text"><span>climaneer</span> realtime db</div>
      </div>
      <div class="sep">|</div>
      <div class="db-path">/</div>
    </div>
    <div class="right">
      <span class="conn-label" id="conn-label">Connecting...</span>
      <span class="conn-dot off" id="conn-dot"></span>
    </div>
  </div>

  <div class="layout">

    <!-- Sidebar: Devices -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h3>Devices</h3>
        <div class="sidebar-actions">
          <button onclick="openAddModal()" title="Add device"><i class="fas fa-plus"></i></button>
          <button onclick="startSim()" title="Simulate ESP32" id="sim-toggle" style="color:#4ade80"><i class="fas fa-robot"></i></button>
          <button onclick="refreshDevices()" title="Refresh"><i class="fas fa-sync-alt"></i></button>
        </div>
      </div>
      <div class="device-list" id="device-list"></div>
    </div>

    <!-- Main: JSON Tree -->
    <div class="main">
      <div class="main-header">
        <h2 id="tree-title">Select a device</h2>
        <div class="controls">
          <button id="btn-expand" onclick="expandAll()"><i class="fas fa-expand-arrows-alt"></i> Expand</button>
          <button id="btn-collapse" onclick="collapseAll()"><i class="fas fa-compress-arrows-alt"></i> Collapse</button>
        </div>
      </div>
      <div class="tree-container" id="tree-container">
        <div style="color:#3f3f46;font-size:13px;padding:40px;text-align:center">
          <i class="fas fa-database" style="font-size:40px;margin-bottom:12px;display:block;color:#27272a"></i>
          Connect an ESP32 or add a device to see data
        </div>
      </div>
    </div>

  </div>

  <div class="statusbar">
    <span id="sb-left">0 devices</span>
    <span id="sb-right"></span>
  </div>

  <!-- Add/Edit Device Modal -->
  <div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3 id="modal-title">Add Device</h3>
      <label>Device ID *</label>
      <input type="text" id="m-devid" placeholder="climaneer-esp32-01" spellcheck="false">
      <label>Device Name</label>
      <input type="text" id="m-devname" placeholder="Greenhouse ESP32" spellcheck="false">
      <label>Firmware</label>
      <input type="text" id="m-fw" placeholder="1.0.0" spellcheck="false">
      <label>Board</label>
      <input type="text" id="m-board" placeholder="ESP32 Dev Kit" spellcheck="false">
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-warn" id="m-del" style="display:none" onclick="modalDelete()">Delete</button>
        <button class="btn-primary" id="m-save" onclick="modalSave()">Add</button>
      </div>
    </div>
  </div>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script>
  (function(){
    var ws=null, devices={}, selectedId=null, expandedPaths={}, wsReconnectTimer=null;

    // ── Toast ────────────────────────────────────────────
    function toast(msg, type){
      type=type||"ok";
      var el=document.createElement("div");
      el.className="toast "+type;
      el.textContent=msg;
      document.body.appendChild(el);
      setTimeout(function(){el.remove()},2500);
    }

    // ── WebSocket ────────────────────────────────────────
    function wsConnect(){
      if(ws&&ws.readyState<=1)return;
      var p=location.protocol==="https:"?"wss:":"ws:";
      ws=new WebSocket(p+"//"+location.host+"/ws");
      ws.onopen=function(){
        setConn(true);
        ws.send(JSON.stringify({type:"register_dashboard"}));
        ws.send(JSON.stringify({type:"get_tree"}));
      };
      ws.onmessage=function(e){
        var msg;try{msg=JSON.parse(e.data)}catch{return}
        handleMessage(msg);
      };
      ws.onclose=function(){
        setConn(false);
        wsReconnectTimer=setTimeout(wsConnect,3000);
      };
      ws.onerror=function(){};
    }

    function wsSend(obj){
      if(ws&&ws.readyState===1)ws.send(JSON.stringify(obj));
    }

    function setConn(ok){
      document.getElementById("conn-dot").className="conn-dot "+(ok?"on":"off");
      document.getElementById("conn-label").textContent=ok?"Connected":"Disconnected";
    }

    // ── Message Handler ──────────────────────────────────
    function handleMessage(msg){
      if(msg.type==="device_list"){
        var list=msg.devices||[];
        // Rebuild devices map from DB list
        var newDevices={};
        for(var i=0;i<list.length;i++){
          var d=list[i];
          var id=d.device_id;
          if(devices[id]){
            newDevices[id]=devices[id];
            newDevices[id].info.device_name=d.device_name||newDevices[id].info.device_name;
            newDevices[id].info.firmware_version=d.firmware_version||newDevices[id].info.firmware_version;
            newDevices[id].info.board_type=d.board_type||newDevices[id].info.board_type;
            newDevices[id].info.last_seen=d.last_seen||newDevices[id].info.last_seen;
            newDevices[id].info.online_status=d.online_status;
          } else {
            newDevices[id]={
              info:{
                device_id:id,
                device_name:d.device_name||"ESP32",
                firmware_version:d.firmware_version||"",
                board_type:d.board_type||"ESP32",
                last_seen:d.last_seen||null,
                online_status:d.online_status||0
              },
              sensors:{soil_moisture:0,ph:0,air_humidity:0,air_temp:0,water_temp:0,water_level:0,air_quality:0,flow:0,battery:0},
              controls:{manual_override:false,pump:false,mode:"AUTO"},
              ai:{recommendation:"Awaiting data..."}
            };
          }
        }
        devices=newDevices;
        renderDeviceList();
        renderTree();
        updateStatusbar();
      }

      if(msg.type==="sensor_update"){
        var id=msg.device_id;
        ensureDevice(id,msg.device_name);
        var dev=devices[id];
        if(msg.sensors)Object.assign(dev.sensors,msg.sensors);
        if(msg.pump!==undefined)dev.controls.pump=msg.pump;
        if(msg.mode)dev.controls.mode=msg.mode;
        if(msg.manual_override!==undefined)dev.controls.manual_override=msg.manual_override;
        renderDeviceList();
        if(selectedId===id)renderTree();
      }

      if(msg.type==="device_status"){
        var id=msg.device_id;
        ensureDevice(id,msg.device_name);
        devices[id].info.online_status=msg.online?1:0;
        if(msg.last_seen)devices[id].info.last_seen=msg.last_seen;
        renderDeviceList();
      }

      if(msg.type==="device_disconnected"){
        if(devices[msg.device_id]){
          devices[msg.device_id].info.online_status=0;
          renderDeviceList();
          if(selectedId===msg.device_id)renderTree();
        }
      }

      if(msg.type==="ai_recommendation"){
        if(msg.device_id&&devices[msg.device_id]){
          devices[msg.device_id].ai.recommendation=msg.recommendation;
          if(selectedId===msg.device_id)renderTree();
        }
      }

      if(msg.type==="tree_data"){
        // Full tree from server - use to populate device data
        var tree=msg.tree||{};
        if(tree.devices){
          Object.keys(tree.devices).forEach(function(id){
            var td=tree.devices[id];
            ensureDevice(id,td.info&&td.info.device_name);
            var dev=devices[id];
            if(td.sensors)Object.assign(dev.sensors,td.sensors);
            if(td.controls)Object.assign(dev.controls,td.controls);
            if(td.ai)Object.assign(dev.ai,td.ai);
            if(td.info){
              dev.info.device_name=td.info.device_name||dev.info.device_name;
              dev.info.firmware_version=td.info.firmware_version||dev.info.firmware_version;
              dev.info.board_type=td.info.board_type||dev.info.board_type;
              dev.info.connected=td.info.connected;
              dev.info.last_seen=td.info.last_seen||dev.info.last_seen;
            }
          });
        }
        renderDeviceList();
        renderTree();
        updateStatusbar();
      }

      if(msg.type==="command_status"){
        toast("Command: "+msg.command+" → "+msg.status);
      }
    }

    function ensureDevice(id,name){
      if(!devices[id]){
        devices[id]={
          info:{device_id:id,device_name:name||"ESP32",firmware_version:"",board_type:"ESP32",last_seen:null,online_status:0},
          sensors:{soil_moisture:0,ph:0,air_humidity:0,air_temp:0,water_temp:0,water_level:0,air_quality:0,flow:0,battery:0},
          controls:{manual_override:false,pump:false,mode:"AUTO"},
          ai:{recommendation:"Awaiting data..."}
        };
      }
      if(name)devices[id].info.device_name=name;
    }

    // ── Device List ──────────────────────────────────────
    function renderDeviceList(){
      var el=document.getElementById("device-list");
      var ids=Object.keys(devices);
      if(ids.length===0){
        el.innerHTML='<div style="text-align:center;padding:20px;color:#3f3f46;font-size:11px">No devices.<br>Connect an ESP32 or click + to add.</div>';
        return;
      }
      el.innerHTML=ids.map(function(id){
        var d=devices[id];
        var online=d.info.online_status;
        var active=id===selectedId?"active":"";
        var label=d.info.device_name||id;
        var fw=d.info.firmware_version||"";
        return '<div class="device-item '+active+'" onclick="selectDevice(\''+id+'\')">'+
          '<span class="dot '+(online?"on":"off")+'"></span>'+
          '<div class="info"><div class="name">'+label+'</div><div class="meta">'+id+(fw?" v"+fw:"")+'</div></div>'+
          '<div class="actions">'+
            '<button onclick="event.stopPropagation();openEditModal(\''+id+'\')" title="Edit"><i class="fas fa-pen"></i></button>'+
            '<button class="del" onclick="event.stopPropagation();deleteDevice(\''+id+'\')" title="Delete"><i class="fas fa-trash"></i></button>'+
          '</div>'+
        '</div>';
      }).join("");
      updateStatusbar();
    }

    // ── JSON Tree ────────────────────────────────────────
    function renderTree(){
      var container=document.getElementById("tree-container");
      var title=document.getElementById("tree-title");
      if(!selectedId||!devices[selectedId]){
        title.textContent="Select a device";
        container.innerHTML='<div style="color:#3f3f46;font-size:13px;padding:40px;text-align:center"><i class="fas fa-database" style="font-size:40px;margin-bottom:12px;display:block;color:#27272a"></i>Connect an ESP32 or add a device to see data</div>';
        return;
      }
      var dev=devices[selectedId];
      title.textContent=dev.info.device_name+" /";
      container.innerHTML=buildTree(dev,"");
    }

    function buildTree(obj,path,depth){
      depth=depth||0;
      if(typeof obj!=="object"||obj===null){
        return renderLeaf(obj);
      }
      var keys=Object.keys(obj);
      var isOpen=expandedPaths[path]||depth<2;
      var toggle=keys.length>0?(isOpen?"&#9662;":"&#9656;"):"";
      var brace=Array.isArray(obj)?["[","]"]:["{","}"];
      var count=keys.length+" "+(keys.length===1?"key":"keys");

      var html='<div class="node">';
      html+='<div class="node-row" onclick="toggleNode(\''+esc(path)+'\')">';
      html+='<span class="toggle">'+toggle+'</span>';
      if(path!==""){
        var keyName=path.split("/").pop();
        html+='<span class="key">'+keyName+'</span><span class="colon">:</span>';
      }
      html+='<span class="bracket">'+brace[0]+'</span>';
      html+='<span class="count">'+count+'</span>';
      html+='<span class="bracket">'+brace[1]+'</span>';
      html+='</div>';
      html+='<div class="node-children '+(isOpen?"":"hidden")+'">';

      for(var i=0;i<keys.length;i++){
        var k=keys[i];
        var cp=path?path+"/"+k:k;
        var v=obj[k];
        if(typeof v==="object"&&v!==null){
          html+=buildTree(v,cp,depth+1);
        } else {
          html+='<div class="node">';
          html+='<div class="node-row">';
          html+='<span style="width:14px"></span>';
          html+='<span class="key">'+k+'</span><span class="colon">:</span>';
          html+='<span class="value '+valClass(v)+' edit-val" onclick="startEdit(\''+esc(cp)+'\',this)" title="Click to edit">'+formatVal(v)+'</span>';
          html+='</div></div>';
        }
      }
      html+='</div></div>';
      return html;
    }

    function renderLeaf(v){
      return '<span class="value '+valClass(v)+'">'+formatVal(v)+'</span>';
    }

    function valClass(v){
      if(v===null||v===undefined)return"null";
      if(typeof v==="string")return"str";
      if(typeof v==="number")return"num";
      if(typeof v==="boolean")return"bool";
      return"";
    }

    function formatVal(v){
      if(v===null||v===undefined)return"null";
      if(typeof v==="string")return'"'+v+'"';
      return String(v);
    }

    function esc(s){return s.replace(/'/g,"\\'")}

    // ── Node Toggle ──────────────────────────────────────
    window.toggleNode=function(path){
      expandedPaths[path]=!expandedPaths[path];
      renderTree();
    };

    window.expandAll=function(){
      walkExpand(devices[selectedId],"");
      renderTree();
    };
    function walkExpand(obj,path){
      if(typeof obj!=="object"||obj===null)return;
      expandedPaths[path]=true;
      var keys=Object.keys(obj);
      for(var i=0;i<keys.length;i++){
        walkExpand(obj[keys[i]],path?path+"/"+keys[i]:keys[i]);
      }
    }

    window.collapseAll=function(){
      expandedPaths={};
      renderTree();
    };

    // ── Inline Edit ──────────────────────────────────────
    window.startEdit=function(path,el){
      var dev=devices[selectedId];
      if(!dev)return;
      var val=getNested(dev,path);
      var isStr=typeof val==="string";
      var input=document.createElement("input");
      input.className="input-inline";
      input.value=isStr?val:formatVal(val);
      input.dataset.path=path;
      input.dataset.type=typeof val;
      el.replaceWith(input);
      input.focus();
      input.select();
      var finish=function(){
        var raw=input.value;
        var newVal;
        var t=input.dataset.type;
        if(t==="number")newVal=raw===""?0:Number(raw);
        else if(t==="boolean")newVal=raw==="true"||raw==="1";
        else if(raw==="null")newVal=null;
        else newVal=raw;
        if(Number.isNaN(newVal))newVal=0;
        setNested(dev,input.dataset.path,newVal);
        // Send override to server
        var parts=input.dataset.path.split("/");
        if(parts[1]==="sensors"&&parts.length===3){
          wsSend({type:"override_sensor",device_id:selectedId,sensor_key:parts[2],value:newVal,enabled:true});
        }
        renderTree();
        toast("Updated "+parts[parts.length-1]);
      };
      input.addEventListener("blur",finish);
      input.addEventListener("keydown",function(e){
        if(e.key==="Enter")input.blur();
        if(e.key==="Escape"){renderTree()}
      });
    };

    function getNested(obj,path){
      var parts=path.split("/").filter(Boolean);
      var cur=obj;
      for(var i=0;i<parts.length;i++){
        if(cur===undefined||cur===null)return undefined;
        cur=cur[parts[i]];
      }
      return cur;
    }

    function setNested(obj,path,val){
      var parts=path.split("/").filter(Boolean);
      var cur=obj;
      for(var i=0;i<parts.length-1;i++){
        if(!cur[parts[i]]||typeof cur[parts[i]]!=="object")cur[parts[i]]={};
        cur=cur[parts[i]];
      }
      cur[parts[parts.length-1]]=val;
    }

    // ── Device Management ────────────────────────────────
    window.selectDevice=function(id){
      selectedId=id;
      expandedPaths={};
      renderDeviceList();
      renderTree();
    };

    window.openAddModal=function(){
      document.getElementById("modal-title").textContent="Add Device";
      document.getElementById("m-devid").value="";
      document.getElementById("m-devid").disabled=false;
      document.getElementById("m-devname").value="";
      document.getElementById("m-fw").value="1.0.0";
      document.getElementById("m-board").value="ESP32 Dev Kit";
      document.getElementById("m-del").style.display="none";
      document.getElementById("m-save").textContent="Add Device";
      document.getElementById("modal").classList.add("open");
    };

    window.openEditModal=function(id){
      var dev=devices[id];
      if(!dev)return;
      document.getElementById("modal-title").textContent="Edit Device";
      document.getElementById("m-devid").value=id;
      document.getElementById("m-devid").disabled=true;
      document.getElementById("m-devname").value=dev.info.device_name||"";
      document.getElementById("m-fw").value=dev.info.firmware_version||"";
      document.getElementById("m-board").value=dev.info.board_type||"";
      document.getElementById("m-del").style.display="inline-block";
      document.getElementById("m-save").textContent="Save";
      document.getElementById("modal").classList.add("open");
      document.getElementById("m-save").onclick=function(){doEdit(id)};
    };

    window.closeModal=function(){
      document.getElementById("modal").classList.remove("open");
      document.getElementById("m-save").onclick=modalSave;
    };

    window.modalSave=function(){
      var id=document.getElementById("m-devid").value.trim();
      var name=document.getElementById("m-devname").value.trim();
      var fw=document.getElementById("m-fw").value.trim();
      var board=document.getElementById("m-board").value.trim();
      if(!id){toast("Device ID required","err");return}
      fetch("/api/devices",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({device_id:id,device_name:name||"ESP32",firmware_version:fw||"1.0.0",board_type:board||"ESP32"})
      }).then(function(r){return r.json()}).then(function(d){
        if(d.error){toast(d.error,"err");return}
        toast("Device added: "+id);
        ensureDevice(id,name);
        devices[id].info.device_name=name||"ESP32";
        devices[id].info.firmware_version=fw||"1.0.0";
        devices[id].info.board_type=board||"ESP32";
        selectedId=id;
        renderDeviceList();
        renderTree();
        closeModal();
      }).catch(function(e){toast("Failed","err")});
    };

    function doEdit(id){
      var name=document.getElementById("m-devname").value.trim();
      var fw=document.getElementById("m-fw").value.trim();
      var board=document.getElementById("m-board").value.trim();
      var body={};
      if(name)body.device_name=name;
      if(fw)body.firmware_version=fw;
      if(board)body.board_type=board;
      fetch("/api/devices/"+id,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)})
      .then(function(r){return r.json()}).then(function(d){
        if(d.error){toast(d.error,"err");return}
        toast("Device updated");
        if(name&&devices[id])devices[id].info.device_name=name;
        if(fw&&devices[id])devices[id].info.firmware_version=fw;
        if(board&&devices[id])devices[id].info.board_type=board;
        renderDeviceList();
        renderTree();
        closeModal();
      }).catch(function(e){toast("Failed","err")});
    }

    window.deleteDevice=function(id){
      if(!confirm("Delete "+id+"? This cannot be undone."))return;
      fetch("/api/devices/"+id,{method:"DELETE"})
      .then(function(r){return r.json()}).then(function(d){
        if(d.error){toast(d.error,"err");return}
        toast("Deleted: "+id);
        delete devices[id];
        if(selectedId===id){selectedId=null}
        renderDeviceList();
        renderTree();
      }).catch(function(e){toast("Failed","err")});
    };

    window.refreshDevices=function(){
      wsSend({type:"get_tree"});
      toast("Refreshing...");
    };

    // ── Status Bar ───────────────────────────────────────
    function updateStatusbar(){
      var ids=Object.keys(devices);
      var online=ids.filter(function(id){return devices[id].info.online_status}).length;
      document.getElementById("sb-left").textContent=ids.length+" device"+(ids.length!==1?"s":"")+" | "+online+" online";
      document.getElementById("sb-right").textContent=new Date().toLocaleTimeString();
    }

    setInterval(updateStatusbar,5000);

    // ── ESP32 Simulator ──────────────────────────────────
    var simWs=null, simTimer=null, simRunning=false;

    window.startSim=function(){
      if(simRunning){stopSim();return}
      var p=location.protocol==="https:"?"wss:":"ws:";
      simWs=new WebSocket(p+"//"+location.host+"/ws");
      simWs.onopen=function(){
        simRunning=true;
        document.getElementById("sim-toggle").style.color="#f87171";
        document.getElementById("sim-toggle").title="Stop simulation (click)";
        simWs.send(JSON.stringify({type:"register",device_id:"sim-esp32-01",device_name:"Simulated ESP32",firmware_version:"1.0.0-sim",board_type:"ESP32 Simulator"}));
        simTimer=setInterval(sendSimData,2000);
        toast("Simulation started");
      };
      simWs.onclose=function(){
        simRunning=false;
        document.getElementById("sim-toggle").style.color="#4ade80";
        document.getElementById("sim-toggle").title="Simulate ESP32";
        if(simTimer){clearInterval(simTimer);simTimer=null}
      };
      simWs.onerror=function(){};
    };

    function stopSim(){
      if(simTimer){clearInterval(simTimer);simTimer=null}
      if(simWs){simWs.close();simWs=null}
      simRunning=false;
      document.getElementById("sim-toggle").style.color="#4ade80";
      document.getElementById("sim-toggle").title="Simulate ESP32";
      toast("Simulation stopped");
    }

    function sendSimData(){
      if(!simWs||simWs.readyState!==1)return;
      var t=Date.now()/1000;
      var sensors={
        soil_moisture:Math.round((50+20*Math.sin(t*0.1))*10)/10,
        ph:Math.round((6.8+0.5*Math.sin(t*0.05))*100)/100,
        air_humidity:Math.round((60+15*Math.sin(t*0.08))*10)/10,
        air_temp:Math.round((25+5*Math.sin(t*0.07))*10)/10,
        water_temp:Math.round((22+3*Math.sin(t*0.06))*10)/10,
        water_level:Math.round((70+10*Math.sin(t*0.04))*10)/10,
        air_quality:Math.round(80+40*Math.sin(t*0.03)),
        flow:Math.round((30+20*Math.abs(Math.sin(t*0.15)))*10)/10,
        battery:Math.round(85+5*Math.sin(t*0.01))
      };
      simWs.send(JSON.stringify({type:"sensor_update",device_id:"sim-esp32-01",sensors:sensors}));
    }

    // ── Init ─────────────────────────────────────────────
    wsConnect();
  })();
  </script>
</body>
</html>
